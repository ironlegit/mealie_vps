services:

  # Reverse Proxy ----
  swag:
    image: lscr.io/linuxserver/swag:latest
    container_name: swag
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - URL=${MEALIE_DOMAIN}
      # Cert challenge 
      - VALIDATION=http
      - ONLY_SUBDOMAINS=false # If you wish to get certs only for certain subdomains
      - STAGING=false # enable to receive certs in staging mode
    volumes:
      - /etc/config/swag:/config
    ports:
      - 443:443
      - 80:80 # for cert renewal
    networks:
      - mealie_network
    restart: unless-stopped

  # Mealie ----
  mealie:
    image: ghcr.io/mealie-recipes/mealie:v3.17.0
    container_name: mealie
    restart: always
    networks:
        - mealie_network
    deploy:
      resources:
        limits:
          memory: 1000M # limit memory
    volumes:
      - mealie-data:/app/data/
    environment:
      ALLOW_SIGNUP: "false"
      PUID: 1000
      PGID: 1000
      API_PORT: 9000
      DB_ENGINE: sqlite
      TZ: UTC
      BASE_URL: https://${MEALIE_DOMAIN}
      # Email config
      SMTP_HOST: ${MEALIE_EMAIL_HOST}
      SMTP_PORT: ${MEALIE_EMAIL_PORT}
      SMTP_AUTH_STRATEGY: ${MEALIE_EMAIL_AUTH}
      SMTP_FROM_EMAIL: ${MEALIE_EMAIL}
      SMTP_USER: ${MEALIE_EMAIL}
      SMTP_PASSWORD: ${MEALIE_EMAIL_PW}

volumes:
  mealie-data:

networks:
  mealie_network:
    driver: bridge
